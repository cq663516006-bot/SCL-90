<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCL-90 链接管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;}
.top-bar{background:#1d1d1f;padding:16px 24px;display:flex;align-items:center;gap:12px;}
.top-bar h1{color:#fff;font-size:17px;font-weight:600;}
.top-bar .ver{font-size:11px;color:#888;background:#333;padding:3px 8px;border-radius:6px;}
.container{max-width:720px;margin:0 auto;padding:24px 20px 60px;}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.card h2{font-size:15px;font-weight:600;margin-bottom:16px;color:#1d1d1f;}
.field-label{font-size:12px;color:#666;font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.step-badge{background:#007aff;color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
input[type=text],input[type=number]{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:14px;font-family:inherit;}
input:focus{border-color:#007aff;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;}
.btn{padding:11px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.btn-blue{background:#007aff;color:#fff;} .btn-blue:hover{background:#0062cc;}
.btn-gray{background:#f0f0f0;color:#333;} .btn-gray:hover{background:#e0e0e0;}
.btn-red{background:#ff3b30;color:#fff;} .btn-red:hover{background:#c00;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px;}
.stat{background:#f5f5f7;border-radius:12px;padding:16px;text-align:center;}
.stat-n{font-size:28px;font-weight:700;color:#007aff;}
.stat-l{font-size:12px;color:#666;margin-top:4px;}
.notice{background:#fff8e6;border:1px solid #ffd060;border-radius:10px;padding:13px 16px;font-size:13px;color:#7a5a00;line-height:1.6;margin-bottom:16px;}
.notice b{display:block;margin-bottom:3px;}
.token-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;max-height:380px;overflow-y:auto;}
.ti{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f9f9fb;border-radius:10px;border:1px solid #eee;font-size:13px;}
.ti-idx{color:#999;font-size:12px;width:28px;flex-shrink:0;text-align:right;}
.ti-url{flex:1;color:#007aff;word-break:break-all;font-size:12px;}
.ti-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.badge-new{background:#e8f5e9;color:#2e7d32;} .badge-sent{background:#fce4ec;color:#c62828;}
.copy-btn{padding:5px 12px;background:#007aff;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.copy-btn:hover{background:#0062cc;} .copy-btn.ok{background:#34c759;}
.mark-btn{padding:5px 10px;background:#f0f0f0;color:#444;border:none;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.mark-btn:hover{background:#ddd;}
.empty-tip{color:#999;font-size:14px;text-align:center;padding:24px;}
.dl-box{background:#1d1d1f;border-radius:12px;padding:20px;margin-top:14px;}
.dl-box p{color:#aaa;font-size:12px;margin-bottom:12px;line-height:1.7;}
.dl-box p b{color:#fff;}
#dl-btn{width:100%;padding:14px;background:#34c759;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
#dl-btn:hover{background:#28a745;}
#dl-btn:disabled{background:#444;color:#888;cursor:not-allowed;}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🔐 SCL-90 链接管理后台</h1>
  <span class="ver">最新版 · 数据不上传</span>
</div>

<div class="container">

  <div class="notice">
    <b>📌 每次发链接流程</b>
    ① 生成链接 → ② 点"下载 index.html" → ③ 上传到 GitHub 覆盖旧文件（等1-2分钟）→ ④ 复制链接发给客户
  </div>

  <div class="card">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">已生成总数</div></div>
      <div class="stat"><div class="stat-n" id="s-new">0</div><div class="stat-l">未发送</div></div>
      <div class="stat"><div class="stat-n" id="s-sent">0</div><div class="stat-l">已发送</div></div>
    </div>
  </div>

  <div class="card">
    <h2>⚙️ 生成设置</h2>
    <div class="field-label"><span class="step-badge">1</span>&nbsp;你的测试页地址</div>
    <input type="text" id="base-url" value="https://xinlishudong.github.io/SCL-90/" placeholder="https://xinlishudong.github.io/SCL-90/">
    <div class="field-label"><span class="step-badge">2</span>&nbsp;本次生成数量</div>
    <input type="number" id="gen-count" value="50" min="1" max="500">
    <div class="btn-row">
      <button class="btn btn-blue" onclick="generate()">🔑 生成链接</button>
      <button class="btn btn-gray" onclick="copyAll()">📋 复制全部</button>
      <button class="btn btn-red" onclick="clearAll()">🗑️ 清空重置</button>
    </div>
  </div>

  <div class="card">
    <h2>📥 第二步：下载并上传到 GitHub</h2>
    <div class="dl-box">
      <p>生成链接后点下方按钮，下载包含最新 token 白名单的 <b>index.html</b>。<br>
      然后去 GitHub 仓库上传覆盖旧文件，等约1分钟，客户链接即可正常使用。</p>
      <button id="dl-btn" disabled onclick="downloadIndex()">⬇️ 下载 index.html（含最新 token）</button>
    </div>
  </div>

  <div class="card">
    <h2>🔗 链接列表</h2>
    <div class="token-list" id="token-list">
      <div class="empty-tip">还没有链接，点"生成链接"开始</div>
    </div>
  </div>

</div>

let tokens = JSON.parse(localStorage.getItem('scl90v3') || '[]');

function rand(n){
  const c='abcdefghijklmnopqrstuvwxyz0123456789';
  let r='';for(let i=0;i<n;i++)r+=c[Math.floor(Math.random()*c.length)];return r;
}

function generate(){
  const base=document.getElementById('base-url').value.trim().replace(/\/+$/,'');
  const count=parseInt(document.getElementById('gen-count').value)||50;
  if(!base){alert('请先填写测试页地址！');return;}
  const existing=new Set(tokens.map(t=>t.code));
  let added=0;
  while(added<count){
    const code='xl'+rand(12);
    if(!existing.has(code)){
      tokens.push({code,url:base+'/?t='+code,sent:false,date:new Date().toLocaleDateString('zh-CN')});
      existing.add(code);added++;
    }
  }
  save();render();
  document.getElementById('dl-btn').disabled=false;
  alert('✅ 已生成 '+count+' 个链接！\n\n请点"下载 index.html"，上传到 GitHub 后链接才能生效。');
}

function save(){localStorage.setItem('scl90v3',JSON.stringify(tokens));}

function render(){
  const total=tokens.length,sent=tokens.filter(t=>t.sent).length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-new').textContent=total-sent;
  document.getElementById('s-sent').textContent=sent;
  const list=document.getElementById('token-list');
  if(!total){
    list.innerHTML='<div class="empty-tip">还没有链接，点"生成链接"开始</div>';
    document.getElementById('dl-btn').disabled=true;
    return;
  }
  document.getElementById('dl-btn').disabled=false;
  list.innerHTML=tokens.map((t,i)=>`
    <div class="ti">
      <div class="ti-idx">${i+1}</div>
      <div class="ti-url">${t.url}</div>
      <span class="ti-badge ${t.sent?'badge-sent':'badge-new'}">${t.sent?'已发':'未发'}</span>
      <button class="copy-btn" onclick="copyOne(this,'${t.url}')">复制</button>
      <button class="mark-btn" onclick="toggleSent(${i})">${t.sent?'↩撤回':'✓已发'}</button>
    </div>`).join('');
}

function copyOne(btn,url){
  navigator.clipboard.writeText(url).then(()=>{
    btn.textContent='已复制!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='复制';btn.classList.remove('ok');},2000);
  });
}
function toggleSent(i){tokens[i].sent=!tokens[i].sent;save();render();}
function copyAll(){
  if(!tokens.length){alert('还没有链接');return;}
  navigator.clipboard.writeText(tokens.map(t=>t.url).join('\n'))
    .then(()=>alert('已复制全部 '+tokens.length+' 条链接！'));
}
function clearAll(){
  if(!confirm('确定清空所有链接？不可撤销！'))return;
  tokens=[];save();render();
}
function downloadIndex(){
  if(!tokens.length){alert('请先生成链接');return;}
  const decoded=decodeURIComponent(escape(atob(TPL_B64)));
  const tokenStr=tokens.map(t=>"'"+t.code+"'").join(',');
  const finalHtml=decoded.replace('%%TOKENS%%','['+tokenStr+']');
  const blob=new Blob([finalHtml],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='index.html';a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
